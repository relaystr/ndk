name: Release (Test Draft)

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  FLUTTER_VERSION: "3.41.4"
  JAVA_VERSION: "17"
  FLUTTER_RUST_BRIDGE_VERSION: "1.80.1"
  RUST_VERSION: "1.93"

jobs:
  build_cli:
    needs: release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux_x64
            platform_name: linux-x64
            content_type: application/gzip
          - os: macos-latest
            target: macos_arm64
            platform_name: macos-arm64
            content_type: application/gzip
          - os: macos-latest
            target: macos_x64
            platform_name: macos-x64
            content_type: application/gzip
          - os: windows-latest
            target: windows_x64
            platform_name: windows-x64
            content_type: application/gzip
    defaults:
      run:
        shell: bash
        working-directory: ./packages/ndk
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Dart
        if: matrix.target != 'macos_x64'
        uses: dart-lang/setup-dart@v1

      - name: Set up Dart (x86_64 SDK)
        if: matrix.target == 'macos_x64'
        run: |
          curl -fsSL "https://storage.googleapis.com/dart-archive/channels/stable/release/latest/sdk/dartsdk-macos-x64-release.zip" -o dart-sdk.zip
          unzip -q dart-sdk.zip
          echo "$PWD/dart-sdk/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: dart pub get

      - name: Install Rosetta
        if: matrix.target == 'macos_x64'
        run: softwareupdate --install-rosetta --agree-to-license

      - name: Build CLI executable (x64 via Rosetta)
        run: |
          if [ "${{ matrix.target }}" = "macos_x64" ]; then
            arch -x86_64 dart build cli
          else
            dart build cli
          fi
      - name: Build CLI bundle archive name metadata
        id: meta
        run: |
          ref_name="${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}"
          safe_ref_name="${ref_name//\//-}"
          echo "safe_ref_name=${safe_ref_name}" >> "$GITHUB_OUTPUT"

      - name: Package CLI bundle
        run: |
          tar -czf "build/ndk-cli-${{ matrix.platform_name }}.tar.gz" -C "build/cli/${{ matrix.target }}/bundle" .

      - name: Build Linux DEB package
        if: matrix.target == 'linux_x64'
        run: |
          deb_root="build/deb-root"
          rm -rf "$deb_root"
          mkdir -p "$deb_root/DEBIAN" "$deb_root/usr/lib/ndk" "$deb_root/usr/bin"
          cp -R "build/cli/${{ matrix.target }}/bundle/." "$deb_root/usr/lib/ndk/"
          ln -s ../lib/ndk/bin/ndk "$deb_root/usr/bin/ndk"
          cat > "$deb_root/DEBIAN/control" <<'EOF'
          Package: ndk
          Version: 0.0.0~${{ github.run_number }}
          Section: utils
          Priority: optional
          Architecture: amd64
          Maintainer: relaystr <opensource@relaystr.com>
          Depends: libc6 (>= 2.27)
          Description: Nostr Development Kit command line interface
          EOF
          dpkg-deb --build "$deb_root" "build/ndk-cli-linux-x64.deb"

      - name: Upload CLI executable to release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.release.outputs.upload_url }}
          asset_path: packages/ndk/build/ndk-cli-${{ matrix.platform_name }}.tar.gz
          asset_name: ndk-cli-${{ matrix.platform_name }}.tar.gz
          asset_content_type: ${{ matrix.content_type }}

      - name: Upload Linux DEB to release
        if: matrix.target == 'linux_x64'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.release.outputs.upload_url }}
          asset_path: packages/ndk/build/ndk-cli-linux-x64.deb
          asset_name: ndk-cli-linux-x64.deb
          asset_content_type: application/vnd.debian.binary-package

  build_android:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository }}
    needs: release
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          distribution: "zulu"
          java-version: ${{ env.JAVA_VERSION }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: "rustfmt"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: "stable"
          cache: true
          cache-key: "flutter-:os:-:channel:-:version:-:arch:-:hash:"
          cache-path: "${{ runner.tool_cache }}/flutter/:channel:-:version:-:arch:"
          architecture: x64

      - name: Retrieve base64 keystore and decode it to a file
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > "${{ github.workspace }}/android-keystore.jks"

      - name: Create key.properties file
        env:
          KEYSTORE_PROPERTIES_PATH: ${{ github.workspace }}/packages/sample-app/android/key.properties
        run: |
          cd packages/sample-app
          echo 'storeFile=${{ github.workspace }}/packages/sample-app/android-keystore.jks' > $KEYSTORE_PROPERTIES_PATH
          echo 'keyAlias=${{ secrets.KEYSTORE_KEY_ALIAS }}' >> $KEYSTORE_PROPERTIES_PATH
          echo 'storePassword=${{ secrets.KEYSTORE_PASSWORD }}' >> $KEYSTORE_PROPERTIES_PATH
          echo 'keyPassword=${{ secrets.KEYSTORE_KEY_PASSWORD }}' >> $KEYSTORE_PROPERTIES_PATH

      - name: pub get
        run: |
          cd packages/sample-app
          flutter pub get

      - name: build apk-split
        run: |
          cd packages/sample-app
          flutter build apk --split-per-abi

      - name: Upload arm64 APK to release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.release.outputs.upload_url }}
          asset_path: packages/sample-app/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          asset_name: ndk-demo-app-android-arm64-v8a.apk
          asset_content_type: application/zip

      - name: Upload armeabi-v7a APK to release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.release.outputs.upload_url }}
          asset_path: packages/sample-app/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
          asset_name: ndk-demo-app-android-armeabi-v7a.apk
          asset_content_type: application/zip

      - name: Upload x86_64 APK to release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.release.outputs.upload_url }}
          asset_path: packages/sample-app/build/app/outputs/flutter-apk/app-x86_64-release.apk
          asset_name: ndk-demo-app-android-x86_64.apk
          asset_content_type: application/zip

  call-build:
    needs: [build_cli, build_android]
    uses: ./.github/workflows/deploy-sample-app-web.yml
    with:
      deploy_ref: ${{ github.ref }}
      base_href: /app/test/
      destination_dir: app/test

  release:
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      id: ${{ steps.create_release.outputs.id }}
    steps:
      - name: Create Draft Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: test-${{ github.run_id }}
          target_commitish: ${{ github.event.pull_request.head.sha || github.sha }}
          release_name: Test Draft ${{ github.head_ref || github.ref_name }} #${{ github.run_number }}
          draft: true
          prerelease: true
