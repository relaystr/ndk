name: Release (Test Draft)

on:
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

env:
  FLUTTER_VERSION: "3.41.4"
  JAVA_VERSION: "17"
  FLUTTER_RUST_BRIDGE_VERSION: "1.80.1"
  RUST_VERSION: "1.93"

jobs:
  build_cli:
    needs: release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux_x64
            binary_name: ndk
            asset_name: ndk-${{ github.ref_name }}-linux-x64
            content_type: application/octet-stream
          - os: macos-latest
            target: macos_x64
            binary_name: ndk
            asset_name: ndk-${{ github.ref_name }}-macos-x64
            content_type: application/octet-stream
          - os: windows-latest
            target: windows_x64
            binary_name: ndk.exe
            asset_name: ndk-${{ github.ref_name }}-windows-x64.exe
            content_type: application/vnd.microsoft.portable-executable
    defaults:
      run:
        working-directory: ./packages/ndk
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Dart
        uses: dart-lang/setup-dart@v1

      - name: Install dependencies
        run: dart pub get

      - name: Build CLI executable
        run: dart build cli

      - name: Upload CLI executable to release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.release.outputs.upload_url }}
          asset_path: packages/ndk/build/cli/${{ matrix.target }}/bundle/bin/${{ matrix.binary_name }}
          asset_name: ${{ matrix.asset_name }}
          asset_content_type: ${{ matrix.content_type }}

  build_android:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository }}
    needs: release
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          distribution: "zulu"
          java-version: ${{ env.JAVA_VERSION }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: "rustfmt"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: "stable"
          cache: true
          cache-key: "flutter-:os:-:channel:-:version:-:arch:-:hash:"
          cache-path: "${{ runner.tool_cache }}/flutter/:channel:-:version:-:arch:"
          architecture: x64

      - name: Retrieve base64 keystore and decode it to a file
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > "${{ github.workspace }}/android-keystore.jks"

      - name: Create key.properties file
        env:
          KEYSTORE_PROPERTIES_PATH: ${{ github.workspace }}/packages/sample-app/android/key.properties
        run: |
          cd packages/sample-app
          echo 'storeFile=${{ github.workspace }}/packages/sample-app/android-keystore.jks' > $KEYSTORE_PROPERTIES_PATH
          echo 'keyAlias=${{ secrets.KEYSTORE_KEY_ALIAS }}' >> $KEYSTORE_PROPERTIES_PATH
          echo 'storePassword=${{ secrets.KEYSTORE_PASSWORD }}' >> $KEYSTORE_PROPERTIES_PATH
          echo 'keyPassword=${{ secrets.KEYSTORE_KEY_PASSWORD }}' >> $KEYSTORE_PROPERTIES_PATH

      - name: pub get
        run: |
          cd packages/sample-app
          flutter pub get

      - name: build apk-split
        run: |
          cd packages/sample-app
          flutter build apk --split-per-abi

      - name: build apk
        run: |
          cd packages/sample-app
          flutter build apk

      - name: Upload universal APK to release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.release.outputs.upload_url }}
          asset_path: packages/sample-app/build/app/outputs/flutter-apk/app-release.apk
          asset_name: ndk_demo-${{ github.ref_name }}-android-universal.apk
          asset_content_type: application/zip

      - name: Upload arm64 APK to release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.release.outputs.upload_url }}
          asset_path: packages/sample-app/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          asset_name: ndk_demo-${{ github.ref_name }}-android-arm64-v8a.apk
          asset_content_type: application/zip

      - name: Upload armeabi-v7a APK to release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.release.outputs.upload_url }}
          asset_path: packages/sample-app/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
          asset_name: ndk_demo-${{ github.ref_name }}-android-armeabi-v7a.apk
          asset_content_type: application/zip

      - name: Upload x86_64 APK to release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.release.outputs.upload_url }}
          asset_path: packages/sample-app/build/app/outputs/flutter-apk/app-x86_64-release.apk
          asset_name: ndk_demo-${{ github.ref_name }}-android-x86_64.apk
          asset_content_type: application/zip

  release:
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      id: ${{ steps.create_release.outputs.id }}
    steps:
      - name: Create Draft Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: test-${{ github.run_id }}
          target_commitish: ${{ github.event.pull_request.head.sha || github.sha }}
          release_name: Test Draft ${{ github.head_ref || github.ref_name }} #${{ github.run_number }}
          draft: true
          prerelease: true
