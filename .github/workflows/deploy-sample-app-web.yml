name: Deploy sample-app web to GitHub Pages

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "gh-pages-app"
  cancel-in-progress: true

env:
  FLUTTER_VERSION: "3.41.4"

jobs:
  deploy:
    if: github.ref_name == 'master'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./packages/sample-app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
          cache-key: "flutter-:os:-:channel:-:version:-:arch:-:hash:"
          cache-path: "${{ runner.tool_cache }}/flutter/:channel:-:version:-:arch:"
          architecture: x64

      - name: Install dependencies
        run: flutter pub get

      - name: Build web app
        run: flutter build web --release --base-href "/app/"

      - name: Prepare Drift web runtime assets
        run: |
          set -euo pipefail

          set -- "$HOME"/.pub-cache/hosted/pub.dev/drift-*/
          DRIFT_PKG_DIR="${!#}"

          cp "$DRIFT_PKG_DIR/extension/devtools/build/sqlite3.wasm" build/web/sqlite3.wasm
          dart compile js "$DRIFT_PKG_DIR/web/drift_worker.dart" -o build/web/drift_worker.js

      - name: Copy wasm/js runtime assets
        run: |
          mkdir -p build/web/pkg
          cp -R web/pkg/. build/web/pkg/

      - name: Deploy app into gh-pages /app
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./packages/sample-app/build/web
          destination_dir: app
          keep_files: true
