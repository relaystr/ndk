name: Deploy sample-app web to GitHub Pages

on:
  workflow_call:
    inputs:
      deploy_ref:
        description: Git ref to build and deploy from
        required: false
        type: string
      base_href:
        description: Base href for Flutter web build
        required: false
        type: string
        default: /app/
      destination_dir:
        description: Destination directory on gh-pages branch
        required: false
        type: string
        default: app
  workflow_dispatch:
    inputs:
      deploy_ref:
        description: Git ref to build and deploy from
        required: false
        default: ''
      base_href:
        description: Base href for Flutter web build
        required: false
        default: /app/
      destination_dir:
        description: Destination directory on gh-pages branch
        required: false
        default: app

permissions:
  contents: write

concurrency:
  group: "gh-pages-app"
  cancel-in-progress: true

env:
  FLUTTER_VERSION: "3.41.4"

jobs:
  deploy:
    if: github.event_name == 'workflow_call'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./packages/sample-app
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.deploy_ref || github.ref }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
          cache-key: "flutter-:os:-:channel:-:version:-:arch:-:hash:"
          cache-path: "${{ runner.tool_cache }}/flutter/:channel:-:version:-:arch:"
          architecture: x64

      - name: Install dependencies
        run: flutter pub get

      - name: Build web app
        run: flutter build web --release --base-href "${{ inputs.base_href || github.event.inputs.base_href || '/app/' }}"

      - name: Copy wasm/js runtime assets
        run: |
          mkdir -p build/web/pkg
          cp -R web/pkg/. build/web/pkg/
          cp web/drift_worker.js build/web/drift_worker.js

      - name: Deploy app into gh-pages /app
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./packages/sample-app/build/web
          destination_dir: ${{ inputs.destination_dir || github.event.inputs.destination_dir || 'app' }}
          keep_files: true
