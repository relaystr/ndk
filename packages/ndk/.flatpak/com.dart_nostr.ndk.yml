id: com.dart_nostr.ndk
runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk
command: ndk
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --share=network

cleanup:
  - '/include'
  - '*.a'

modules:
  - name: ndk
    buildsystem: simple
    build-commands:
      - install -Dm755 ndk /app/bin/ndk  
    sources:
      - type: file
        path: ./build/cli/linux_x64/bundle/bin/ndk
