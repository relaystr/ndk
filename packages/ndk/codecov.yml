ignore:
  - "**/*.g.dart"
  - "../bip32_keys/lib/**"
coverage:
  status:
    project:
      default:
        target: auto      # baseline = previous commit's coverage
        threshold: 5%     # ✅ allow up to 5% drop — tune this to your X
    patch:
      default:
        target: 80%          # only require 80% of NEW lines to be covered
        informational:  true

